<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff Profile | MAAP</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="portal-body" data-page="staff_profile">
  <header class="portal-header">
    <div class="container portal-nav">
      <a class="portal-brand" href="staff.html">
        <img src="assets/logo-mark.jpg" alt="MAAP" class="portal-logo" />
        <div class="portal-brand-text">
          <div class="portal-org">Madonna Ability Alliance Portal</div>
          <div class="portal-title">MAAP</div>
        </div>
      </a>
      <div class="portal-right" data-auth></div>
    </div>
  </header>

  <main class="portal-page">
    <div class="container">
      <div class="portal-heading">
        <div>
          <h1 class="portal-h1" id="staffTitle">Staff</h1>
          <p class="portal-sub" id="staffRole">—</p>
        </div>
        <a class="btn-maap blue" href="staff.html">← Back to Staff</a>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn-maap orange" id="deleteStaffBtn" type="button" style="display:none;">Delete Staff Profile</button>
        </div>
      </div>

      <div class="portal-grid staff-profile-grid">
        <section class="portal-main">
          <div class="portal-card">
            <div style="display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap;">
              <div class="profile-photo">
                <div class="photo-frame">
                  <img id="staffHeadshot" class="record-photo" src="assets/empty-headshot.jpg" alt="Staff photo" />
                </div>
                <div id="staffPhotoControls" class="photo-controls" style="display:none;">
                  <label class="btn-maap blue photo-upload-btn" for="staffPhotoUpload">Add photo</label>
                  <input id="staffPhotoUpload" type="file" accept="image/*" style="display:none;" />
                  <div id="staffPhotoStatus" class="portal-footnote"></div>
                </div>
              </div>
              <div style="flex:1; min-width:220px;">
                <div class="portal-label">Email</div>
                <div id="staffEmail" class="portal-muted">—</div>

                <div class="portal-label" style="margin-top:10px;">Phone</div>
                <div id="staffPhone" class="portal-muted">—</div>

                <div class="portal-label" style="margin-top:10px;">Address</div>
                <div id="staffAddress" class="portal-muted">—</div>
              </div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
