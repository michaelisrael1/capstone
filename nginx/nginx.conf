events {} # Basic requirement for Nginx to run

http {
    # This ensures your CSS and JS are recognized as code, not plain text
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80; # Nginx listens on port 80 INSIDE the container

        # 1. SERVE THE FRONTEND
        # This looks into your 'Madonna' folder for index.html
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. PROXY THE BACKEND
        # Any request starting with /api/ goes to FastAPI
        location /api/ {
            proxy_pass http://fastapi:8000/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}